{% extends "base.html" %}
{% block title %}Удаление поста{% endblock %}
{% block content %}
<div class="container">
  <h1>Удаление поста</h1>
  <p>Вы уверены, что хотите удалить пост "{{ post.title }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'blog:post_detail' post.id %}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
